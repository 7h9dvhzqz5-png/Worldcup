<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 — Prediction League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#050F1F;        /* base — stadium navy, night session */
    --panel:#0A1830;        /* raised surfaces */
    --panel-2:#11233F;      /* hover / inner */
    --line:#1D3153;         /* hairlines */
    --ink:#F4F7FD;          /* floodlit white */
    --muted:#92A5C4;        /* secondary text */
    --faint:#5F7396;        /* tertiary */
    --gold:#E6B84C;         /* trophy — leader, pot, medals only */
    --host-r:#E5274B;       /* host tri-band: Canada */
    --host-g:#15A85C;       /* host tri-band: Mexico */
    --host-b:#3D7BFF;       /* host tri-band: USA */
    --tri:linear-gradient(90deg, var(--host-r) 0 33.4%, var(--host-g) 33.4% 66.7%, var(--host-b) 66.7% 100%);
    --gold-soft:#3a2f14;
    --live:#FF4D55;         /* reserved for LIVE only */
    --pos:#21B573;          /* points scored */
    --radius:14px;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  .fl{font-size:1.02em;line-height:1}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #0E2546 0%, var(--pitch) 55%) fixed,
      var(--pitch);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-feature-settings:"tnum" 1,"cv05" 1;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 96px}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(180deg, rgba(5,15,31,.97), rgba(5,15,31,.88));
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .hoststripe{height:4px;background:var(--tri)}
  .top-inner{max-width:920px;margin:0 auto;padding:14px 16px 0;display:flex;align-items:center;gap:14px}
  .crest{
    width:42px;height:42px;flex:0 0 auto;border-radius:12px;position:relative;
    color:var(--ink);
    display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:18px;letter-spacing:-.02em;
    background:linear-gradient(160deg,#0E2143,#081428);
    box-shadow:0 6px 16px -6px rgba(61,123,255,.45), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .crest::before{
    content:"";position:absolute;inset:-2px;border-radius:14px;z-index:-1;
    background:linear-gradient(135deg,var(--host-r),var(--host-g) 50%,var(--host-b));
  }
  .crest::after{
    content:"";position:absolute;inset:0;border-radius:12px;z-index:-1;
    background:linear-gradient(160deg,#0E2143,#081428);
  }
  .titles{flex:1;min-width:0}
  .titles h1{
    font-family:'Archivo';font-weight:800;font-size:20px;letter-spacing:.02em;margin:0;line-height:1;
    text-transform:uppercase;text-shadow:0 1px 0 rgba(0,0,0,.35);
  }
  .titles .sub{color:var(--gold);font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
  .status{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto}
  .upd{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.02em}
  .refresh{
    appearance:none;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    font-family:var(--mono);font-size:11px;font-weight:500;padding:6px 10px;border-radius:8px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:border-color .15s,background .15s;
  }
  .refresh:hover{border-color:var(--gold);background:var(--panel)}
  .refresh:active{transform:translateY(1px)}
  .refresh svg{width:12px;height:12px}
  .refresh.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Ticker ---------- */
  .ticker{margin-top:12px;border-top:1px solid var(--line);background:rgba(0,0,0,.18)}
  .ticker-inner{max-width:920px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:9px 16px;scrollbar-width:none}
  .ticker-inner::-webkit-scrollbar{display:none}
  .tk{
    flex:0 0 auto;border:1px solid var(--line);background:var(--panel);border-radius:10px;
    padding:7px 11px;min-width:max-content;display:flex;flex-direction:column;gap:3px;
  }
  .tk .tk-top{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .tk .tk-state{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase}
  .tk .tk-state.live{color:var(--live)}
  .tk .tk-state.ft{color:var(--faint)}
  .tk .tk-state.up{color:var(--gold)}
  .tk .tk-score{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;white-space:nowrap}
  .tk .tk-score .sc{font-family:var(--mono);font-weight:700;font-size:14px}
  .tk .tk-score .sc.up{color:var(--faint)}
  .tk-empty{flex:0 0 auto;color:var(--faint);font-size:12px;padding:7px 4px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;box-shadow:0 0 0 0 rgba(255,77,85,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,85,.55)}70%{box-shadow:0 0 0 7px rgba(255,77,85,0)}100%{box-shadow:0 0 0 0 rgba(255,77,85,0)}}

  /* ---------- Banner ---------- */
  .banner{margin-top:14px;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .banner.warn{border-color:#5a4a2a;background:rgba(230,184,76,.07);color:#e8d4a8}
  .banner.gold{border-color:#5a4a2a;background:rgba(230,184,76,.08);color:#e8d4a8}
  .banner b{font-weight:700;color:var(--gold)}

  /* ---------- Tabs ---------- */
  nav.tabs{display:flex;gap:4px;margin:18px 0 18px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line)}
  nav.tabs::-webkit-scrollbar{display:none}
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;color:var(--muted);
    font-family:'Archivo';font-weight:700;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
    padding:11px 12px 13px;white-space:nowrap;position:relative;margin-bottom:-1px;transition:color .15s;
  }
  .tab::after{content:"";position:absolute;left:10px;right:10px;bottom:0;height:3px;border-radius:2px 2px 0 0;background:var(--tri);opacity:0;transition:opacity .15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink)}
  .tab.active::after{opacity:1}

  /* ---------- Generic ---------- */
  h2.section{font-family:'Archivo';font-weight:700;font-size:15px;letter-spacing:.05em;text-transform:uppercase;margin:0 0 5px;padding-left:12px;position:relative}
  h2.section::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:4px;border-radius:2px;background:linear-gradient(180deg,var(--host-r) 0 33%,var(--host-g) 33% 66%,var(--host-b) 66% 100%)}
  .section-note{color:var(--muted);font-size:12.5px;margin:0 0 16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 16px 36px -22px rgba(0,0,0,.75)}

  /* ---------- Leaderboard ---------- */
  .lb-row{
    display:grid;grid-template-columns:34px 1fr auto auto;align-items:center;gap:12px;
    padding:13px 16px;border-bottom:1px solid var(--line);position:relative;
  }
  .lb-row:last-child{border-bottom:none}
  .lb-row.leader{background:linear-gradient(90deg, rgba(230,184,76,.10), transparent 60%)}
  .lb-row.leader::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--host-r) 0 33%,var(--host-g) 33% 66%,var(--host-b) 66% 100%)}
  .rank{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--faint);text-align:center}
  .lb-row.leader .rank{color:var(--gold)}
  .who{min-width:0}
  .who .nm{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who .meta{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .who .meta .chip{display:inline-flex;align-items:center;gap:4px;background:var(--panel-2);border:1px solid var(--line);padding:2px 8px;border-radius:999px;font-size:10.5px}
  .who .meta .chip.alive{color:var(--gold);border-color:rgba(230,184,76,.45);background:rgba(230,184,76,.08)}
  .pts{text-align:right;flex:0 0 auto}
  .pts .big{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1;letter-spacing:-.01em}
  .pts .lbl{font-size:9.5px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
  .pts .pend{font-size:10.5px;color:var(--gold);margin-top:3px;font-family:var(--mono)}

  /* expandable breakdown */
  .lb-row{cursor:pointer}
  .lb-row:not(.leader):hover{background:linear-gradient(90deg, rgba(255,255,255,.022), transparent 70%)}
  /* "this is me" */
  .star{appearance:none;background:none;border:none;cursor:pointer;color:var(--faint);font-size:18px;line-height:1;padding:4px;border-radius:8px;transition:color .15s,transform .1s}
  .star:hover{color:var(--gold);transform:scale(1.1)}
  .star.on{color:var(--gold)}
  .lb-row.me{background:linear-gradient(90deg, rgba(61,123,255,.12), transparent 72%)}
  .lb-row.me::after{content:"";position:absolute;right:0;top:0;bottom:0;width:3px;background:var(--host-b)}
  .you-tag{display:inline-block;margin-left:6px;font-family:'Archivo';font-weight:700;font-size:8.5px;letter-spacing:.12em;color:#bcd2ff;background:rgba(61,123,255,.18);border:1px solid rgba(61,123,255,.5);padding:1px 5px;border-radius:5px;vertical-align:2px}
  /* form + rank-trend sparkline */
  .bd-line.trend{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .trend-l{font-size:11px;color:var(--faint)}
  .spark{display:inline-block;vertical-align:middle}
  .form{font-family:var(--mono);font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px}
  .form.up{color:var(--pos);background:rgba(33,181,115,.12)} .form.dn{color:#e0606a;background:rgba(224,96,106,.12)}
  /* info banner */
  .banner.info{border-color:rgba(61,123,255,.4);background:rgba(61,123,255,.08);color:#cfe0ff}
  /* out of prize contention */
  .who .meta .chip.out{color:#d98a8c;border-color:rgba(229,72,77,.4);background:rgba(229,72,77,.08)}
  .lb-row.isout{opacity:.74}
  .lb-row.isout.me{opacity:1}
  .bd-line.out-line{color:#d98a8c}
  .bd-line.why{color:var(--muted);font-size:11.5px;line-height:1.55;border-left:2px solid var(--line);padding-left:10px;margin-top:8px}
  .tap-hint{margin:0 0 2px;padding:6px 2px;color:var(--muted);font-size:11.5px;line-height:1.4}
  .who .meta .chip.best{color:#cfe0ff;border-color:rgba(61,123,255,.4);background:rgba(61,123,255,.08)}
  /* prize pot + podium markers */
  .pot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 12px 16px;border-bottom:1px solid var(--line);background:linear-gradient(90deg, rgba(230,184,76,.07), transparent);position:relative}
  .pot::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--host-r) 0 33%,var(--host-g) 33% 66%,var(--host-b) 66% 100%)}
  .pot .pl{font-family:'Archivo';font-weight:700;font-size:13px;letter-spacing:.01em}
  .pot .pl span{color:var(--gold)}
  .pot .br{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .medal{flex:0 0 auto;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:14px;box-shadow:0 3px 10px -4px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.14);text-shadow:0 1px 2px rgba(0,0,0,.45)}
  .medal.m1{background:linear-gradient(150deg,#6f5621,#2b2009 62%);border:1px solid #E6B84C;color:#FFD771}
  .medal.m2{background:linear-gradient(150deg,#4c525b,#1f2226 62%);border:1px solid #CDD2D8;color:#EEF2F7}
  .medal.m3{background:linear-gradient(150deg,#6a4a2e,#291c10 62%);border:1px solid #C68A5C;color:#EAB78C}
  .prize{font-family:var(--mono);font-weight:700;font-size:11px;margin-top:3px}
  .prize.m1{color:var(--gold)} .prize.m2{color:#D7DBE0} .prize.m3{color:#D6A06E}
  .payout-cut{display:flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(0,0,0,.18);border-bottom:1px solid var(--line)}
  .payout-cut .ln{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--line) 0 6px,transparent 6px 12px)}
  .payout-cut .tx{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .breakdown{display:none;grid-column:1/-1;margin-top:10px;padding-top:12px;border-top:1px dashed var(--line)}
  .lb-row.open .breakdown{display:block}
  .bd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
  .bd-cell{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;text-align:center}
  .bd-cell .v{font-family:var(--mono);font-weight:700;font-size:16px}
  .bd-cell .k{font-size:9.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
  .bd-line{font-size:12px;color:var(--muted);margin-top:8px}
  .bd-line b{color:var(--ink);font-weight:600}

  /* ---------- Top scorer / Winner ---------- */
  .race-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .race-head .h{font-family:'Archivo';font-weight:700;font-size:14px}
  .race-head .pp{font-family:var(--mono);font-size:11px;color:var(--gold)}
  .scorer{display:grid;grid-template-columns:26px 1fr auto;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
  .scorer:last-child{border-bottom:none}
  .scorer .gn{font-family:var(--mono);color:var(--faint);font-weight:700;text-align:center}
  .scorer.lead .gn{color:var(--gold)}
  .scorer.won{background:linear-gradient(90deg, rgba(230,184,76,.10), transparent 72%)}
  .scorer.won .gn,.scorer.won .gz{color:var(--gold)}
  .scorer .pl{font-weight:600;font-size:14px}
  .scorer .pl .tm{color:var(--muted);font-weight:400;font-size:12px}
  .scorer .gz{font-family:var(--mono);font-weight:700;font-size:18px;text-align:right}
  .scorer .gz small{display:block;font-family:'Inter';font-size:9.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;font-weight:500}
  .backers{padding:7px 16px 13px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line)}
  .backers:last-child{border-bottom:none}
  .backers .lbl{font-size:11px;color:var(--faint);width:100%;margin-bottom:1px}
  .tagp{font-size:11.5px;background:var(--gold-soft);color:#eccf93;border:1px solid #5a4a2a;border-radius:99px;padding:3px 9px;font-weight:500}
  .tagp.none{background:var(--panel-2);color:var(--faint);border-color:var(--line)}

  .pickgroup{padding:12px 16px;border-bottom:1px solid var(--line)}
  .pickgroup:last-child{border-bottom:none}
  .pickgroup.out{opacity:.42}
  .pickgroup .tt{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;margin-bottom:6px}
  .pickgroup .tt .ko{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--live);border:1px solid #5a2a2c;border-radius:99px;padding:2px 7px}
  .pickgroup .tt .cnt{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .pickgroup .tt .pg-goals{font-family:var(--mono);font-size:11px;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:99px;padding:2px 8px}
  .pickgroup .tt .ko.lead{color:var(--gold);border-color:#5a4a2a}
  .pickgroup.lead{background:linear-gradient(90deg, rgba(230,184,76,.07), transparent 70%)}
  .pickgroup.champ .tt .pg-goals{border-color:#5a4a2a;color:var(--gold)}
  .pickgroup .names{display:flex;flex-wrap:wrap;gap:6px}
  .pickgroup .names span{font-size:12.5px;color:var(--muted)}
  .pickgroup.champ{background:linear-gradient(90deg, rgba(216,162,74,.1), transparent 70%)}
  .pickgroup.champ .tt{color:var(--gold)}

  /* ---------- Fixtures ---------- */
  .grp-h{display:flex;align-items:center;gap:8px;font-family:'Archivo';font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);padding:14px 16px 6px}
  .grp-h::before{content:"";width:4px;height:14px;border-radius:2px;background:linear-gradient(180deg,var(--host-r) 0 33%,var(--host-g) 33% 66%,var(--host-b) 66% 100%)}
  .fx{display:grid;grid-template-columns:1fr 84px 1fr;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line)}
  /* tap-to-expand fixture + live/today emphasis */
  .fxwrap{border-bottom:1px solid var(--line);cursor:pointer;position:relative}
  .fxwrap:last-child{border-bottom:none}
  .fxwrap .fx{border-bottom:none}
  .fxwrap:hover{background:rgba(255,255,255,.02)}
  .fxwrap.islive{background:linear-gradient(90deg, rgba(255,77,85,.08), transparent 75%)}
  .fxwrap.islive::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--live)}
  .fxwrap.istoday::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--host-b)}
  .fxdetail{display:none;padding:4px 16px 14px}
  .fxwrap.open .fxdetail{display:block}
  .fxd-h{font-family:'Archivo';font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:6px 0 8px}
  .fxd-list{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px}
  .fxd-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;border-radius:6px}
  .fxd-row.me{background:rgba(61,123,255,.12);padding-left:6px;padding-right:6px;margin:0 -6px}
  .fxd-n{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
  .fxd-row.me .fxd-n{color:var(--ink);font-weight:600}
  .fxd-g{font-family:var(--mono);color:var(--ink);font-weight:700}
  .fxd-soon{font-family:var(--mono);color:var(--faint);font-size:11px;width:26px;text-align:right}
  @media (max-width:560px){ .fxd-list{grid-template-columns:1fr} }
  .fx:last-child{border-bottom:none}
  .fx .t1{text-align:right;font-size:13.5px;font-weight:500}
  .fx .t2{text-align:left;font-size:13.5px;font-weight:500}
  .fx .mid{text-align:center}
  .fx .res{font-family:var(--mono);font-weight:700;font-size:16px}
  .fx .res .v{color:var(--faint)}
  .fx .st{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;color:var(--faint)}
  .fx .st.live{color:var(--live)}
  .fx .st.ft{color:var(--pos)}
  .seg{display:flex;gap:4px;padding:0 16px 14px;flex-wrap:wrap}
  .seg button{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer}
  .seg button.on{border-color:var(--gold);color:var(--ink)}

  /* ---------- Predictions ---------- */
  .selrow{padding:14px 16px;border-bottom:1px solid var(--line)}
  .selrow select{width:100%;appearance:none;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:'Inter';font-size:14px;font-weight:600}
  .pr{display:grid;grid-template-columns:1fr 110px 1fr;gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line)}
  .pr:last-child{border-bottom:none}
  .pr .p1{text-align:right;font-size:13px}
  .pr .p2{text-align:left;font-size:13px}
  .pr .pm{text-align:center}
  .pr .guess{font-family:var(--mono);font-size:14px;font-weight:700}
  .pr .actual{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:2px}

<script>
/* =====================================================================
   WORLD CUP 2026 PREDICTION LEAGUE — YOUR DATA FILE
   ---------------------------------------------------------------------
   This is the ONLY file you need to edit. The app (index.html) reads it.

   WHAT TO EDIT:
   1) players[]      -> add your ~15 mates and their predictions
   2) manualResults  -> (optional) paste a final score to guarantee it
   3) topScorers[]   -> update the live Golden Boot table as it changes
   4) champion       -> set the winning team after the final (awards 40)
   5) goldenBoot     -> set the top-scorer name after the final (awards 60)
   6) eliminated[]   -> (optional) teams knocked out, to grey out winner picks

   HOW PREDICTIONS WORK:
   - "preds" is a list of 72 scores, one per group match, IN ORDER.
   - Each score is "HOME-AWAY", e.g. "2-1". Leave "" for no prediction.
   - The fixture order is exactly your master sheet (Group A match 1 first).
   - See fixtures[] at the bottom if you need to check the order.

window.LEAGUE_DATA = {

  config: {
    title: "World Cup 26",
    subtitle: "Prediction League",
    // TheSportsDB free API (backup feed). 4429 = FIFA World Cup.
    apiKey: "123",
    leagueId: "4429",

       trophy theme, both finalists shown with their backers, kickoff countdown,
       gold confetti. Auto-derives the finalists from the feed. Turn off after
       the final is played (the finale/champion view takes over then anyway). */
    themeFinal: true,
    /* ---- FINALE (automatic) ----
       The app watches the live feed for the FINAL (any game on/after finalDate
       reaching full-time). When ESPN marks it finished, the site flips to the
       final-standings view by itself: champion set from the result, Golden Boot
       settled from the tournament scorer chart, and the top 3 get a
       "Collect your winnings" button that plays winningsVideo (a file you

    finalDate: "2026-07-19",
    winningsVideo: "winnings.mp4",
    /* Behind-the-scenes anthem: put an audio file (e.g. anthem.mp3) in the repo

<script>
(function(){
  "use strict";
  const D = window.LEAGUE_DATA;
  if(!D || !D.config){
    document.getElementById("view").innerHTML =
      '<div class="empty">Couldn\'t load the league data. The data block in this file is missing or has a typo — check it and reload.</div>';
    return;
  }
  const C = D.config;
  // Trophy graphic (embedded, background removed) — falls back to the emoji.
  const TRO = (typeof window!=="undefined" && window.TROPHY_B64)
    ? `<img class="trophy" src="data:image/png;base64,${window.TROPHY_B64}" alt="trophy">` : "🏆";
  const PTS = C.points;

  /* ---------------- Team name normalisation ---------------- */
  const ALIASES = {
    "south korea":["korea republic","korea","republic of korea"],
    "czechia":["czech republic"],
    "bosnia & herzegovina":["bosnia and herzegovina","bosnia-herzegovina","bosnia"],
    "usa":["united states","united states of america","united states men's national soccer team"],
    "türkiye":["turkiye","turkey"],
    "curaçao":["curacao"],
    "ivory coast":["cote d'ivoire","côte d'ivoire","ivory coast (cote d'ivoire)"],
    "netherlands":["holland","the netherlands"],
    "iran":["ir iran","iran islamic republic"],
    "cape verde":["cabo verde"],
    "dr congo":["congo dr","democratic republic of the congo","congo democratic republic","rd congo"],
    "south africa":["rsa"],
    "saudi arabia":["ksa"],
  };
  const norm = s => (s||"").toString().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/&/g,"and").replace(/[^a-z0-9]+/g," ").trim();
  const canonMap = {};
  D.fixtures.forEach(f=>{ [f.home,f.away].forEach(t=>{ canonMap[norm(t)] = t; }); });
  Object.entries(ALIASES).forEach(([canon,alts])=>{
    const c = norm(canon);
    alts.forEach(a=> canonMap[norm(a)] = canonMap[c] || canon );
  });
  function teamKey(name){
    const n = norm(name);
    if(canonMap[n]) return norm(canonMap[n]);
    // also collapse known aliases not in fixtures
    for(const [canon,alts] of Object.entries(ALIASES)){
      if(alts.map(norm).includes(n)) return norm(canon);
    }
    return n;
  }

  /* ---------------- Flags (broadcast-style) ---------------- */
  const FLAGS = {
    "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",

  // flag for any spelling/alias of a team name; empty string if unknown

  /* ---------------- Results store ---------------- */

  let api = { byPair:{}, scorers:{}, live:[], recent:[], upcoming:[], ok:false, attempted:false, source:"", finalDone:false, autoChampion:null, autoElim:[], knockouts:[] };

     be lost if ESPN later drops the game from its window. Manual results still

  const FT_STORE_KEY = "wc26_fulltime_v1";
  let ftCache = (function(){
    try{ return JSON.parse(localStorage.getItem(FT_STORE_KEY)||"{}") || {}; }
    catch(e){ return {}; }
  })();
  function ftSave(){

  function lockFinal(fid, h, a){
    if(fid==null || h==null || a==null) return;

  const GOAL_STORE_KEY = "wc26_goals_v1";

    try{ return JSON.parse(localStorage.getItem(GOAL_STORE_KEY)||"{}") || {}; }

  function logGoal(sig, name, team){
    if(!sig || !name) return;

    // up on a later poll, fill it in — but never overwrite a known team with a blank.
    const keepTeam = team || (prev && prev.team) || "";

    if(!goalLogDirty) return;

  }
  // Tally goals per player from the permanent log (one count per unique scoring play).
  function tallyGoals(){
    const t = {};
    const ST = D.scorerTeam||{};
    const lookup = nm => { if(ST[nm]) return ST[nm]; const k=Object.keys(ST).find(x=>nameMatch(x,nm)); return k?ST[k]:""; };
    for(const sig in goalLog){
      const g = goalLog[sig]; if(!g || !g.name) continue;
      const e = t[g.name] || (t[g.name] = {team:g.team||"", goals:0});

      .map(([player,o])=>({player, team:o.team||"", goals:o.goals||0}))
      .filter(s=>s.goals>0)

    if(a===b) return true;
    if(a.length>=4 && b.length>=4 && (a.includes(b)||b.includes(a))) return true;
    const ta=a.split(" "), tb=b.split(" ");
    const la=ta[ta.length-1], lb=tb[tb.length-1];

  function buildResults(){

  /* ---------------- Scoring ---------------- */

  function computeStandings(results){

      let liveExact=0, liveOne=0, liveRonly=0;

      const bootIsLeader = !!(pl.topScorer && leaders.some(s=>nameMatch(pl.topScorer, s.player)));

        winnerAliveScore: winnerEliminated ? 0 : (pl.winner ? 1 : 0),   // tie-break 3: champion pick still standing

     || a.goalDiff-b.goalDiff                    // 3) closest to total goals scored
     || b.winnerAliveScore-a.winnerAliveScore    // 4) champion pick still alive
     || b.bootGoals-a.bootGoals                  // 5) Golden Boot pick scoring more goals

  /* ---------------- API fetch ---------------- */
  const API_BASE = `https://www.thesportsdb.com/api/v1/json/${C.apiKey}/`;
  const ESPN_SLUG = C.espnSlug || "fifa.world";
  const ESPN_BASE = `https://site.api.espn.com/apis/site/v2/sports/soccer/${ESPN_SLUG}/scoreboard`;

  function ingestESPN(events){

      if(!H||!A) return;

      // Any game on/after config.finalDate reaching full-time is the World Cup

      {

        if(done0 && d0 && d0 >= (C.finalDate||"2026-07-19")){
          let champ=null;
          if(H.winner===true) champ=nameOf(H);
          else if(A.winner===true) champ=nameOf(A);
          else if(H.score!=null && A.score!=null && H.score!=="" && A.score!=="" && +H.score!==+A.score) champ=(+H.score>+A.score)?nameOf(H):nameOf(A);

        // (a fixable alias gap). Knockout fixtures arrive as bracket placeholders
        // ("Group A Winner", "Third Place …", "Runner-up") and/or are dated after the
        // group stage — they aren't scored here, so ignore them quietly.
        const evDate = (ev.date||"").slice(0,10);
        const ph = s => /\b(winner|runner|run-?up|place|group|third|loser|tbd|q\d)\b/i.test(s||"");
        if(evDate && evDate <= GROUP_END && !ph(nameOf(H)) && !ph(nameOf(A))){

      const isPre = state==="pre" || (!live && !finished);
      // ESPN sends placeholder "0" scores on pre-match events — never treat those as real.

        h: hasScore?+H.score:null, a: hasScore?+A.score:null,
        status: st.detail||st.description||"", live, finished: finished && hasScore,

      // ticker — the group scores retire once these begin.

      // are still tallied across the whole tournament.)
      const inGroupWindow = !rec.date || rec.date <= GROUP_END;

      }

      // tournament (group + knockouts) into the permanent log, so the Golden Boot
      // race is always complete even if the feed later drops old games' details.
      // Build a team lookup for THIS match so a goal detail that only references
      // its team by id/abbreviation can still be resolved to a country name.
      const teamById = {};
      const addTeam = c => { if(!c) return; const t=c.team||c; const nm=(t&&(t.displayName||t.name))||""; if(!nm) return;
        if(t.id!=null) teamById[String(t.id)]=nm; if(c.id!=null) teamById[String(c.id)]=nm;
        if(t.abbreviation) teamById[String(t.abbreviation).toUpperCase()]=nm; if(t.uid) teamById[String(t.uid)]=nm; };
      addTeam(H); addTeam(A);
      const resolveTeam = (a,d) => {
        const at=a&&a.team;
        return (at&&(at.displayName||at.name)) ||
               (at&&at.id!=null&&teamById[String(at.id)]) ||
               (at&&at.abbreviation&&teamById[String(at.abbreviation).toUpperCase()]) ||
               (d&&d.team&&(d.team.displayName||d.team.name)) ||
               (d&&d.team&&d.team.id!=null&&teamById[String(d.team.id)]) ||
               (d&&d.team&&teamById[String(d.team)]) ||
               (a&&a.teamId!=null&&teamById[String(a.teamId)]) || "";
      };
      (comp.details||[]).forEach((d,di)=>{
        const txt = ((d.type&&d.type.text)||"").toLowerCase();
        const isGoal = d.scoringPlay===true || /goal/.test(txt);
        const ownGoal = /own goal/.test(txt);
        const periodTxt = ((d.period&&(d.period.displayValue||d.period.type))||"").toLowerCase();
        const shootout = d.shootout===true || /shootout/.test(txt) || /shootout/.test(periodTxt);
        if(!isGoal || ownGoal || shootout) return;
        (d.athletesInvolved||[]).slice(0,1).forEach(a=>{
          const nm=a.displayName||a.shortName; if(!nm) return;
          logGoal(ev.id+"|"+di, nm, resolveTeam(a,d));   // unique per scoring play, across refetches
        });
      });
      used=true;
    });
    return used;
  }

  function inPlay(ev){
    const s=(ev.strStatus||"").toLowerCase(), p=(ev.strProgress||"");
    if(/(1st|2nd|first|second|half|live|in play|extra)/.test(s)) return true;
    if(p && /\d/.test(p) && !/ft|aet|fin/i.test(s)) return true;
    return false;
  }
  function isFinished(ev){
    const s=(ev.strStatus||"").toLowerCase();
    if(/(match finished|ft|aet|finished|full ?time|fin)/.test(s)) return true;
    return false;

  function ingest(events){ // TheSportsDB shape (fallback)

    events.forEach(ev=>{
      if(String(ev.idLeague)!==String(C.leagueId)) { if(ev.idLeague) return; }
      const hk=teamKey(ev.strHomeTeam), ak=teamKey(ev.strAwayTeam);
      if(!hk||!ak) return;
      if(!KEY2DISP[hk] || !KEY2DISP[ak]) return;   // not a World Cup pairing we track
      const hs = ev.intHomeScore, as = ev.intAwayScore;
      const hasScore = hs!=null && hs!=="" && as!=null && as!=="";
      const live = inPlay(ev);
      const rec = {
        homeKey:hk, awayKey:ak,
        h: hasScore?+hs:null, a: hasScore?+as:null,
        status: ev.strStatus||ev.strProgress||"", live, finished: hasScore&&!live,
        started: hasScore||live,
        home:ev.strHomeTeam, away:ev.strAwayTeam, date:ev.dateEvent, time:ev.strTime
      };
      const pair = hk+"|"+ak;
      const dEv = ev.dateEvent||"";
      if(dEv && dEv > GROUP_END) return;   // ignore knockout rounds for fixture mapping
      const prev = api.byPair[pair];
      if(!prev || rec.live || (rec.h!=null && prev.h==null)) api.byPair[pair]=rec;
    });
  }
  async function getJSON(url){
    const r = await fetch(url,{cache:"no-store"});

  function renderLeaderboard(){
    const results = buildResults();
    const S = computeStandings(results);
    const n = S.length;
    const pot = (C.buyIn||0) * n;
    let prizes = [];
    if(C.buyIn && Array.isArray(C.prizeSplit) && C.prizeSplit.length>=3 && n>0){
      const p1 = Math.round(pot*C.prizeSplit[0]), p2 = Math.round(pot*C.prizeSplit[1]);
      prizes = [p1, p2, Math.max(0, pot-p1-p2)];   // 3rd absorbs rounding so the sum is exactly the pot
    }

    // ---- tournament progress (games counter) ----
    let gFin=0, gLive=0;
    D.fixtures.forEach(f=>{ const r=results[f.id]; if(r&&r.finished) gFin++; else if(r&&r.live) gLive++; });
    const gTotal = D.fixtures.length, gLeft = gTotal - gFin - gLive;

    const groupDone = gTotal>0 && gFin===gTotal;
    let html = `<h2 class="section">Scoreboard</h2><p class="section-note">${groupDone
      ? `Group scoring done &amp; dusted — only the bonuses are left: <b>+${PTS.winner}</b> winner · <b>+${PTS.topScorer}</b> top scorer, never shared. Ties: most exact scores → closest total goals → bonus picks.`
      : `Tap a row for the points breakdown. ${PTS.exact} exact · ${PTS.resultOne} result + a score · ${PTS.resultOnly} result · ${PTS.winner} winner · ${PTS.topScorer} top scorer. Live matches count at the current score. Ties broken by most exact scores, then closest to total goals, then how the bonus picks are doing.`}</p>`;
    if(!groupDone){
      html += `<div class="progress">
        <div class="pgline"><span class="pgfill" style="width:${gTotal?((gFin+gLive)/gTotal*100).toFixed(1):0}%"></span></div>
        <div class="pgstats"><b>${gFin}</b> played${gLive?` · <b class="pglive">${gLive}</b> live`:``} · <b>${gLeft}</b> to play <span class="pgof">of ${gTotal}</span></div>
      </div>`;
    }
    html += `<div class="panel">`;
    if(!S.length){ html += `<div class="empty">No entrants yet. Add your mates in the data block (search for <code>players:</code>).</div></div>`; view.innerHTML=html; return; }
    if(prizes.length===3){
      html += `<div class="pot"><div class="pl">Prize pot <span>£${pot}</span></div><div class="br">${n} × £${C.buyIn}&nbsp; ·&nbsp; £${prizes[0]} / £${prizes[1]} / £${prizes[2]}</div></div>`;
    }
    const effChampionLB = D.champion || (api.finalDone && api.autoChampion) || null;
    const finale = !!effChampionLB;
    if(finale){
      html += `<div class="final-strip">
        <div class="fs-cup">${TRO}</div>
        <div class="fs-champ">${fteam(effChampionLB, true)} — WORLD CHAMPIONS</div>
        <div class="fs-sub">FULL-TIME · FINAL STANDINGS · Top 3 collect below 💷</div>
      </div>`;
    }
    html += finale
      ? `<div class="tap-hint">Final table. Top 3 — hit <b>🎬 Collect your winnings</b> on your row.</div>`
      : `<div class="tap-hint">Tap a name for the full breakdown — picks, tie-breakers, and how each finish is worked out.</div>`;

    const anyScored = S.some(p=>p.total>0);   // pre-tournament, everyone is on 0 — show plain dashes
    // strict unique ranking — the tiebreak chain in computeStandings guarantees no two players are equal
    const ranks = S.map((p,i)=> i+1);
    const actualGoals = S.length ? S[0].actualGoals : 0;

    // last in-the-money row (for the payout divider)
    let lastPaidIdx = -1;
    if(anyScored && prizes.length===3) lastPaidIdx = Math.min(2, n-1);

    // ---- rank movement since the last time a result came in (persisted) ----
    const move = computeMovement(S, ranks, gFin);
    const hist = recordHistory(S, ranks, gFin);

    // ---- live fixtures (for the per-player reveal) ----
    const liveFx = D.fixtures.map((f,i)=>({f,i,r:results[f.id]})).filter(x=>x.r && x.r.live);

    const leaderTotal = S[0].total;
    const prizeLineTotal = S[2] ? S[2].total : null;

    // ---- best achievable finish & prize contention (tie-breaks included) ----
    const remainingGames = gTotal - gFin;
    const bankedOf = q => q.total - (q.liveMp||0);
    let prizeOut;
    if(remainingGames===0 && anyScored){
      // ENDGAME: every group game is in, so the ONLY points left are the two
      // bonuses (winner +40, boot +60 — never shared).
      //  • HIGHEST finish = rank when the player's OWN picks land (their max points).
      //  • LOWEST finish  = worst rank across every champion×boot outcome (their
      //    picks miss and rivals' picks land). Real tie-breakers used throughout.
      const champDecided = !!(D.champion || (api.finalDone && api.autoChampion));
      const bootDecided   = !!(D.goldenBoot || api.finalDone);
      const champOpts = champDecided ? [null] : [...new Set(S.filter(q=>!q.winnerEliminated && q.winner).map(q=>q.winner)), null];
      const bootOpts  = bootDecided  ? [null] : [...new Set(S.filter(q=>!q.bootEliminated && q.topScorer).map(q=>q.topScorer)), null];
      const cmp=(a,b)=>(b._ts-a._ts)||(b.correct-a.correct)||(a.goalDiff-b.goalDiff)||(b.winnerAliveScore-a.winnerAliveScore)||(b.bootGoals-a.bootGoals)||(b.one-a.one)||(b.ronly-a.ronly)||a.name.localeCompare(b.name);
      const rankIn=(champ,boot)=>{ S.forEach(q=>{ q._ts = bankedOf(q) + (champ&&q.winner===champ?PTS.winner:0) + (boot&&q.topScorer===boot?PTS.topScorer:0); }); return S.slice().sort(cmp); };
      // HIGHEST finish — each player's own picks landing (dead picks award nothing)
      const ownChamp = p => (!champDecided && p.winner    && !p.winnerEliminated) ? p.winner    : null;
      const ownBoot  = p => (!bootDecided  && p.topScorer && !p.bootEliminated)   ? p.topScorer : null;
      const best={};
      S.forEach(p=>{
        const champ=ownChamp(p), boot=ownBoot(p);
        const ranked=rankIn(champ,boot);
        const idx=ranked.findIndex(x=>x.name===p.name);
        const sa=S.reduce((c,x)=>c+(x._ts>p._ts?1:0),0);
        best[p.name]={rank:idx+1,champ,boot,strictAbove:sa,above:ranked.slice(0,idx).map(x=>x.name)};
      });
      // LOWEST finish — worst rank across all outcomes
      const worst={}; S.forEach(q=>worst[q.name]={rank:0,champ:null,boot:null});
      champOpts.forEach(champ=>bootOpts.forEach(boot=>{
        rankIn(champ,boot).forEach((q,idx)=>{ if(idx+1 > worst[q.name].rank) worst[q.name]={rank:idx+1,champ,boot}; });
      }));
      // REALISTIC range — same alive champions, but the Golden Boot can only go
      // to a pick still ON the pace (within bootLongshotGap of the leaders) or
      // to a scorer nobody picked. Off-the-pace long shots are excluded from
      // everyone's realistic picture, top and bottom.
      const GAPR = (C.bootLongshotGap||3);
      const paceBootsAll = bootDecided ? [null] : [...new Set(S.filter(q=>{
        const ob = (!bootDecided && q.topScorer && !q.bootEliminated) ? q.topScorer : null;
        return ob && ((q.bootRaceLead||0)-(q.bootGoals||0)) < GAPR;
      }).map(q=>q.topScorer)), null];
      const realR={}; S.forEach(q=>realR[q.name]={best:S.length+1,worst:0});
      champOpts.forEach(champ=>paceBootsAll.forEach(boot=>{
        rankIn(champ,boot).forEach((q,idx)=>{
          const r=idx+1;
          if(r<realR[q.name].best) realR[q.name].best=r;
          if(r>realR[q.name].worst) realR[q.name].worst=r;
        });
      }));
      S.forEach(q=>{ delete q._ts; });
      prizeOut = S.map(p=>{
        const b=best[p.name], w=worst[p.name];
        const out = prizes.length===3 && n>3 && b.rank>3;
        const maxPts = bankedOf(p) + (b.champ?PTS.winner:0) + (b.boot?PTS.topScorer:0);
        // Boot pick "off the pace": still mathematically alive, but so far behind
        // the Golden Boot leaders (gap >= bootLongshotGap, default 3) that the
        // best-case finish leaning on it is a long shot. For those players we
        // also compute a REALISTIC ceiling: their rank if the winner pick lands
        // but the boot doesn't.
        const GAPT = (C.bootLongshotGap||3);
        const gap = (p.bootRaceLead||0) - (p.bootGoals||0);
        const longshot = !!(ownBoot(p) && (p.bootRaceLead||0)>0 && gap >= GAPT);
        let realRank=null, realWorst=null, realPts=null;
        if(longshot){
          // Realistic world: this player's own boot long shot does NOT land, but
          // any scorer still genuinely ON the pace might — so we rank them in
          // every plausible boot outcome (each on-pace pick landing for its
          // backers, plus the boot going to someone nobody picked) and show the
          // realistic RANGE, own winner pick landing throughout.
          const paceBoots=[...new Set(S.filter(q=>{
            return ownBoot(q) && ((q.bootRaceLead||0)-(q.bootGoals||0)) < GAPT;
          }).map(q=>q.topScorer))];
          let bR=Infinity, wR=0;
          [...paceBoots, null].forEach(bb=>{
            const rr = rankIn(ownChamp(p), bb);
            const r = rr.findIndex(x=>x.name===p.name)+1;
            if(r<bR) bR=r; if(r>wR) wR=r;
          });
          S.forEach(q=>{ delete q._ts; });
          realRank=bR; realWorst=wR;
          realPts = bankedOf(p) + (ownChamp(p)?PTS.winner:0);
        }
        return { out, bestRank:b.rank, champ:b.champ, boot:b.boot, tiebreak: out && b.strictAbove<3,
                 strictAbove:b.strictAbove, tbAbove:(b.rank-1)-b.strictAbove, above:b.above, maxPts,
                 worstRank:w.rank, worstChamp:w.champ, worstBoot:w.boot, minPts:bankedOf(p),
                 myWinner:ownChamp(p), myBoot:ownBoot(p),
                 longshot, gap, bootGoals:p.bootGoals||0, leadGoals:p.bootRaceLead||0, realRank, realWorst, realPts,
                 rBest:realR[p.name].best, rWorst:realR[p.name].worst,
                 locked: prizes.length===3 && n>3 && w.rank<=3 };
      });
    } else {
      // GROUP STAGE: ceiling = banked + 10 per remaining game + bonuses still live.
      const bonusLeftOf = q => (D.goldenBoot || q.bootEliminated ? 0 : (q.topScorer ? PTS.topScorer : 0))
                             + (D.champion ? 0 : ((q.winner && !q.winnerEliminated) ? PTS.winner : 0));
      prizeOut = S.map(p=>{
        const cap = bankedOf(p) + remainingGames*PTS.exact + bonusLeftOf(p);
        let above = 0; for(const q of S){ if(q!==p && bankedOf(q) > cap) above++; }
        return { out: anyScored && prizes.length===3 && n>3 && above>=3, cap, above, bestRank:null };
      });
    }
    const ord = k => { const s=["th","st","nd","rd"], x=k%100; return k+(s[(x-20)%10]||s[x]||s[0]); };
    const bestScenario = po => po.champ&&po.boot?` — if ${esc(po.champ)} win it and ${esc(po.boot)} take the Golden Boot`
                              : po.champ?` — if ${esc(po.champ)} win the Cup`
                              : po.boot?` — if ${esc(po.boot)} wins the Golden Boot`
                              : ` — even with no more bonuses landing`;
    const scenPhrase = po => po.champ&&po.boot?`${esc(po.champ)} winning the Cup and ${esc(po.boot)} taking the Golden Boot`
                            : po.champ?`${esc(po.champ)} winning the Cup`
                            : po.boot?`${esc(po.boot)} winning the Golden Boot`
                            : `no further bonuses landing for anyone`;
    const worstScen = po => {
      const c=po.worstChamp, b=po.worstBoot;
      const bits=[];
      if(c) bits.push(`${esc(c)} win it${po.myWinner&&c===po.myWinner?` (your own pick)`:``}`);
      if(b) bits.push(`${esc(b)}${po.myBoot&&b===po.myBoot?` (your own pick)`:` — not your pick —`} take the Golden Boot`);
      const missed=[];
      if(po.myWinner && c!==po.myWinner) missed.push(esc(po.myWinner));
      if(po.myBoot && b!==po.myBoot) missed.push(esc(po.myBoot));
      let out = bits.length?` — if ${bits.join(" and ")}`:``;
      if(missed.length) out += `${bits.length?` while`:` — if`} your ${missed.join(" and ")} miss out`;
      else if(bits.length) out += `; even with your own pick landing, others edge ahead on the tie-breakers`;
      return out || ` — if the bonuses fall against you`;
    };
    const whyNote = po => {
      if(!po.bestRank) return "";
      let s = `<b>Why:</b> only the winner (+${PTS.winner}) and Golden Boot (+${PTS.topScorer}) bonuses are left, and neither is shared. Best case <b>${po.maxPts} pts</b> (${scenPhrase(po)}) = <b>${ord(po.bestRank)}</b>.`;
      if(po.bestRank===1){
        s += ` Nobody's above you in that world — the title's still on.`;
      } else {
        const ab=po.above||[], shown=ab.slice(0,3).map(esc).join(", "), more=ab.length>3?` +${ab.length-3} more`:``;
        const bits=[];
        if(po.strictAbove>0) bits.push(`${po.strictAbove} on points`);
        if(po.tbAbove>0) bits.push(`${po.tbAbove} on the tie-break`);
        s += ` Even then ${ab.length} finish above you (${shown}${more}${bits.length?` — ${bits.join(", ")}`:``}), and no match points remain to close it.`;
      }
      return s;
    };

    // ---- table sections: in the hunt / needs a long shot / out ----
    // in the hunt  = a top-3 finish is on in the REALISTIC picture (rBest<=3)
    // long shot    = top 3 only if an off-the-pace boot lands (math best<=3, realistic best>3)
    // out          = mathematically out of the top 3
    const cats = S.map((_,i)=> prizeOut[i].out ? 2 : ((prizeOut[i].rBest && prizeOut[i].rBest>3) ? 1 : 0));

          ${(!finale && !prizeOut[idx].out && prizeOut[idx].bestRank && prizeOut[idx].rBest && (prizeOut[idx].rBest!==prizeOut[idx].bestRank||prizeOut[idx].rWorst!==prizeOut[idx].worstRank))?`<div class="bd-line">Realistic range: <b>${ord(prizeOut[idx].rBest)}${prizeOut[idx].rWorst>prizeOut[idx].rBest?`–${ord(prizeOut[idx].rWorst)}`:``} place</b> — eliminated teams and off-the-pace boot picks excluded.</div>`:``}

          ${(!finale && prizeOut[idx].bestRank)?`<div class="bd-line why">${whyNote(prizeOut[idx])}</div>`:``}
          ${((!groupDone||finale) && (sp||formHtml))?`<div class="bd-line trend">${sp?`<span class="trend-l">Rank trend</span> ${sp}`:``}${formHtml}</div>`:``}
          ${p.liveCount?`<div class="bd-line">In play: <b style="color:var(--live)">+${p.liveMp}</b> from ${p.liveCount} live ${p.liveCount===1?"match":"matches"} at the current score — moves with every goal, locks at full time.</div>`:``}
          ${anyScored?`<div class="bd-line">Tiebreakers: <b>${p.correct}</b> exact ${p.correct===1?"score":"scores"} · predicted <b>${p.predGoals}</b> goals vs <b>${actualGoals}</b> actual (${p.goalDiff} off) · boot pick <b>${p.bootGoals}</b> ${p.bootGoals===1?"goal":"goals"}.</div>`:``}
          <div class="bd-line">Top scorer pick: <b>${esc(p.topScorer||"—")}</b>${p.bootWon?` — won (+${PTS.topScorer})`:p.bootEliminated?` — out (team eliminated)`:p.bootLeading?` — currently leading`:p.bootInTable?` — on the scoresheet`:``}.</div>
          <div class="bd-line">Winner pick: <b>${esc(p.winner||"—")}</b>${p.winnerWon?` — champions (+${PTS.winner})`:p.winnerEliminated?` — eliminated`:``}.</div>

      </div>`;
      if(!useSections && idx===lastPaidIdx && idx<S.length-1){ rowHtmls[idx] += `<div class="payout-cut"><span class="ln"></span><span class="tx">payout line</span><span class="ln"></span></div>`; }
    });
    if(useSections){
      const SECS=[
        [0,"💷 IN THE HUNT","A realistic top-3 finish is still on"],
        [1,"⚠ NEEDS A LONG SHOT","Top 3 only happens if an off-the-pace Golden Boot pick comes good"],
        [2,"✕ OUT OF THE MONEY","Mathematically out of the top 3"]
      ];
      SECS.forEach(([c,t,sub])=>{
        const idxs=S.map((_,i)=>i).filter(i=>cats[i]===c);
        if(!idxs.length) return;

    view.querySelectorAll(".lb-row").forEach(r=>{
      r.addEventListener("click",()=>{
        const n=r.getAttribute("data-name");
        if(openRows.has(n)) openRows.delete(n); else openRows.add(n);
        r.classList.toggle("open");
      });
    });
    view.querySelectorAll("[data-star]").forEach(btn=>{
      btn.addEventListener("click",ev=>{
        ev.stopPropagation();
        const nm=btn.getAttribute("data-star");
        meName = (meName===nm) ? "" : nm;
        try{ if(meName) localStorage.setItem("wc26_me_v1",meName); else localStorage.removeItem("wc26_me_v1"); }catch(e){}
        renderLeaderboard();
      });
    });
  }

  // Movement vs the standings as they were after the previous completed match.
  // Persisted in localStorage so the arrows stay meaningful across refreshes/reloads.
  function computeMovement(S, ranks, finishedCount){
    const out={};
    if(!finishedCount) return out;   // no movement until real results exist (avoids spurious day-one arrows)
    const curr={}; S.forEach((p,i)=>{ curr[p.name]=ranks[i]; });
    let snap=null;
    try{ snap=JSON.parse(localStorage.getItem("wc26_rank_snap_v1")||"null"); }catch(e){}
    if(!snap || typeof snap.count!=="number"){
      try{ localStorage.setItem("wc26_rank_snap_v1", JSON.stringify({count:finishedCount, ranks:curr, prev:curr})); }catch(e){}
      return out;
    }
    let prev = snap.prev||snap.ranks||{};
    if(finishedCount !== snap.count){
      // a new result has landed — movement is measured from the last snapshot's live ranks
      prev = snap.ranks||{};
      try{ localStorage.setItem("wc26_rank_snap_v1", JSON.stringify({count:finishedCount, ranks:curr, prev})); }catch(e){}
    }
    S.forEach((p,i)=>{ if(prev[p.name]!=null) out[p.name] = prev[p.name] - ranks[i]; }); // +ve = moved up
    return out;
  }

  // Rank + (banked) points history across match days, persisted. Drives the form
  // figure ("points won since the last result") and the rank-trend sparkline.
  function recordHistory(S, ranks, finishedCount){
    const res = { form:{}, spark:{} };
    if(!finishedCount) return res;
    let hist=[]; try{ hist=JSON.parse(localStorage.getItem("wc26_hist_v1")||"[]")||[]; }catch(e){}
    const ranksMap={}, totalsMap={};
    S.forEach((p,i)=>{ ranksMap[p.name]=ranks[i]; totalsMap[p.name]=p.total-(p.liveMp||0); }); // banked totals
    const entry = {count:finishedCount, ranks:ranksMap, totals:totalsMap};
    const last = hist[hist.length-1];
    if(!last || last.count!==finishedCount) hist.push(entry);   // new result -> new point
    else hist[hist.length-1]=entry;                              // same result -> refresh latest
    if(hist.length>12) hist=hist.slice(-12);
    try{ localStorage.setItem("wc26_hist_v1", JSON.stringify(hist)); }catch(e){}
    if(hist.length>=2){
      const prevT = hist[hist.length-2].totals||{};
      S.forEach(p=>{ if(prevT[p.name]!=null) res.form[p.name] = (p.total-(p.liveMp||0)) - prevT[p.name]; });
    }
    S.forEach(p=>{ res.spark[p.name] = hist.map(h=>h.ranks[p.name]).filter(x=>x!=null); });
    return res;
  }

  // Tiny inline rank-trend sparkline (rank 1 = top of the chart).
  function sparkline(arr, n){
    if(!arr || arr.length<2) return "";
    const w=72,h=18,pad=2.5, lo=1, hi=Math.max(n,2);
    const step=(w-2*pad)/(arr.length-1);
    const y=r=> pad + ((r-lo)/(hi-lo))*(h-2*pad);
    const pts=arr.map((r,i)=>`${(pad+i*step).toFixed(1)},${y(r).toFixed(1)}`).join(" ");
    const improved = arr[arr.length-1] <= arr[0];
    const col = improved ? "var(--pos)" : "#e0606a";
    const lx=(pad+(arr.length-1)*step).toFixed(1), ly=y(arr[arr.length-1]).toFixed(1);
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lx}" cy="${ly}" r="2.1" fill="${col}"/></svg>`;
  }

  function renderScorer(){
    const scorers = getScorers().slice().sort((a,b)=>(b.goals||0)-(a.goals||0));  // ALL scorers, ranked
    const usingLive = !(D.topScorers||[]).length && scorers.length>0;
    const topGoals = scorers.reduce((m,s)=>Math.max(m,s.goals||0),0);

    let html = `<h2 class="section">Top Scorer race</h2><p class="section-note">Worth <b>${PTS.topScorer} points</b> to <i>every</i> entrant who picked the eventual Golden Boot (not shared). Full scoring chart below, with the backers grouped under each scorer.</p>`;
    {
      const elimSet0 = new Set((D.eliminated||[]).concat(api.autoElim||[]).map(teamKey));
      const hasGame0 = team => (api.knockouts||[]).some(k => (k.live || !k.finished) && k.home && k.away && (teamKey(k.home)===teamKey(team) || teamKey(k.away)===teamKey(team)));
      const stillPlaying = scorers.filter(sc=>sc.team && elimSet0.has(teamKey(sc.team)) && hasGame0(sc.team) && (topGoals-(sc.goals||0))<(C.bootLongshotGap||3));
      if(!D.goldenBoot && stillPlaying.length){
        const names=[...new Set(stillPlaying.map(sc=>sc.player))].slice(0,4).join(", ");
        html += `<p class="section-note" style="border-left:2px solid rgba(230,150,60,.5);padding-left:10px;color:#ffce93"><b>Still wide open:</b> ${esc(names)} are out of the tournament but face off in the <b>3rd-place playoff</b>, so they can add to their tallies — the Golden Boot isn't settled yet.</p>`;
      }
    }
    if(D.goldenBoot){
      html += `<div class="banner gold"><div><b>Golden Boot decided:</b> ${esc(D.goldenBoot)} — ${PTS.topScorer} points awarded to everyone who picked them.</div></div>`;
    }
    html += `<div class="panel"><div class="race-head"><span class="h">${usingLive?"Golden Boot race — live from ESPN":"Scoring chart"}</span><span class="pp">${PTS.topScorer} pts at stake</span></div>`;
    if(!scorers.length){
      html += `<div class="empty">No goals logged yet. They appear automatically once matches kick off (whole tournament), or set <code>topScorers</code> in the data block to override.</div>`;
    } else {
      // Rank everyone first (ties share), then split the LIVE RACE (within the
      // long-shot gap of the lead) from the off-the-pace pack, which collapses.
      const GAPS=(C.bootLongshotGap||3);
      const elimSet = new Set((D.eliminated||[]).concat(api.autoElim||[]).map(teamKey));
      // A team can STILL score if it has a knockout game left to play — that
      // includes the two beaten semi-finalists, who meet in the 3rd-place game.
      // So "done" = eliminated AND no live/upcoming knockout game remaining.
      const teamHasGameLeft = team => (api.knockouts||[]).some(k => (k.live || !k.finished) && k.home && k.away && (teamKey(k.home)===teamKey(team) || teamKey(k.away)===teamKey(team)));
      const teamGameLeft = sc => !!(sc.team && teamHasGameLeft(sc.team));
      const teamDone = sc => !!(sc.team && elimSet.has(teamKey(sc.team)) && !teamGameLeft(sc));
      const anyThird = ranked => false; // placeholder (reassigned below)
      let rank=0, prev=null;
      const ranked=scorers.map((sc,i)=>{ if(sc.goals!==prev){rank=i+1;prev=sc.goals;} return {...sc,rank}; });
      // In the race = close enough on goals AND still able to add to their tally.
      // Still able = team alive OR has a game left (e.g. the 3rd-place playoff) —
      // with one exception for the truly done: a knocked-out player already
      // (joint) top who an entrant picked stays, as their final count can win it.
      const isPicked = sc => (D.players||[]).some(p=>nameMatch(p.topScorer||"", sc.player));
      const inRace = sc => D.goldenBoot ? true : ((topGoals-(sc.goals||0)) < GAPS && (!teamDone(sc) || ((sc.goals||0)===topGoals && isPicked(sc))));
      const rowOf = sc => {
        const lead = (sc.goals||0)===topGoals && topGoals>0;
        const won = D.goldenBoot && nameMatch(sc.player, D.goldenBoot);
        const backers = (D.players||[]).filter(p=>nameMatch(p.topScorer||"", sc.player));
        const elimTeam = sc.team && elimSet.has(teamKey(sc.team));
        const tag = won ? `<span class="ko" style="color:var(--gold);border-color:#5a4a2a;margin-left:6px">Golden Boot</span>`
                  : (elimTeam && teamGameLeft(sc)) ? `<span class="ko live" style="margin-left:6px">3rd-place game to come — can still score</span>`
                  : teamDone(sc) ? `<span class="ko" style="margin-left:6px">Out${(sc.goals||0)===topGoals&&topGoals>0?` — stuck on ${sc.goals}`:``}</span>`
                  : ``;
        return `
        <div class="scorer${won?' won':lead?' lead':''}">
          <div class="gn">${sc.rank}</div>
          <div class="pl">${esc(sc.player)} <span class="tm">${flag(sc.team)?flag(sc.team)+" ":""}${esc(sc.team||"")}</span>${tag}</div>
          <div class="gz">${sc.goals||0}<small>goals</small></div>
        </div>
        <div class="backers">
          ${backers.length ? `<span class="lbl">Backers (${backers.length}):</span>` + backers.map(b=>`<span class="tagp">${esc(b.name)}</span>`).join("")
                           : `<span class="tagp none">no entrant picked ${esc(sc.player)}</span>`}
        </div>`;
      };
      const race=ranked.filter(inRace), pack=ranked.filter(sc=>!inRace(sc));
      race.forEach(sc=>{ html += rowOf(sc); });
      html += `</div>`;
      if(pack.length){
        html += `<details class="arch"><summary>Out of the race — ${pack.length} more scorer${pack.length===1?"":"s"} (too far behind, or knocked out and can't add to their tally)</summary><div class="panel">`;
        pack.forEach(sc=>{ html += rowOf(sc); });
        html += `</div>`;
      }
    }
    if(scorers.length===0) html += `</div>`;

    // entrants whose pick hasn't scored yet — GROUPED by pick (one row per player)
    const yetMap = {};
    (D.players||[]).forEach(p=>{
      if(!p.topScorer) return;
      if(scorers.some(s=>nameMatch(p.topScorer, s.player))) return;     // already in the chart above
      (yetMap[p.topScorer]=yetMap[p.topScorer]||[]).push(p.name);
    });
    const yet = Object.entries(yetMap).sort((a,b)=>b[1].length-a[1].length || a[0].localeCompare(b[0]));
    const packOpen = /<details class="arch"><summary>Off the pace/.test(html);
    if(yet.length){
      html += `<div class="panel" style="margin-top:14px"><div class="race-head"><span class="h">Picks yet to score</span><span class="pp">${yet.length} ${yet.length===1?"player":"players"}</span></div>`;
      yet.forEach(([pick,names])=>{
        html += `
        <div class="pickgroup">
          <div class="tt">${esc(pick)} <span class="pg-goals">0 goals</span> <span class="cnt">${names.length}</span></div>
          <div class="names">${names.map(n=>`<span>${esc(n)}</span>`).join(" · ")}</div>
        </div>`;
      });
      html += `</div>`;
    }
    if(packOpen) html += `</details>`;
    view.innerHTML = html;
  }

  function renderWinner(){
    const effChampW = D.champion || (api.finalDone && api.autoChampion) || null;
    const champKey = effChampW?teamKey(effChampW):null;
    const elim = new Set((D.eliminated||[]).concat(api.autoElim||[]).map(teamKey));
    // group players by their winner pick
    const groupsMap = {};
    (D.players||[]).forEach(p=>{
      const k = p.winner||"—";
      (groupsMap[k]=groupsMap[k]||[]).push(p.name);
    });
    const entries = Object.entries(groupsMap).sort((a,b)=>b[1].length-a[1].length || a[0].localeCompare(b[0]));
    let html = `<h2 class="section">Tournament Winner race</h2><p class="section-note">Worth <b>${PTS.winner} points</b>. Each team below shows who backed it. Knocked-out picks are greyed out.</p>`;
    if(D.champion){
      html += `<div class="banner gold"><div><b>Champions:</b> ${esc(D.champion)} — ${PTS.winner} points awarded.</div></div>`;
    }
    const groupHtml = ([team,names])=>{
      const k=teamKey(team);
      const isChamp = champKey && k===champKey;
      const isOut = elim.has(k);
      return `
      <div class="pickgroup${isOut?' out':''}${isChamp?' champ':''}">
        <div class="tt">${fteam(team,true)} ${isChamp?`<span class="ko" style="color:var(--gold);border-color:#5a4a2a">Champions</span>`:isOut?`<span class="ko">Out</span>`:``}<span class="cnt">${names.length}</span></div>
        <div class="names">${names.map(n=>`<span>${esc(n)}</span>`).join(" · ")}</div>
      </div>`;
    };
    const aliveE = entries.filter(([t])=>!elim.has(teamKey(t)));
    const outE   = entries.filter(([t])=> elim.has(teamKey(t)));
    html += `<div class="panel">`;
    aliveE.forEach(e=>{ html += groupHtml(e); });
    if(!aliveE.length) html += `<div class="empty">No picked teams left standing.</div>`;
    html += `</div>`;
    if(outE.length){
      html += `<details class="arch"><summary>Out of the running — ${outE.length} team${outE.length===1?"":"s"}</summary><div class="panel">`;
      outE.forEach(e=>{ html += groupHtml(e); });
      html += `</div></details>`;
    }
    view.innerHTML = html;
  }

  function statusLabel(r){
    if(!r) return {cls:"", txt:""};
    if(r.live) return {cls:"live", txt:"Live"};
    if(r.finished) return {cls:"ft", txt:"FT"};
    return {cls:"", txt:""};
  }
  function renderFixtures(){
    const results = buildResults();
    const today = new Date().toISOString().slice(0,10);
    const segs = [["all","All"],["live","Live"],["ft","Finished"],["up","To come"]];
    const ko=(api.knockouts||[]).slice().sort((x,y)=>(x.kick||x.date||"").localeCompare(y.kick||y.date||""));
    const koMode = ko.length>0;
    let html = `<h2 class="section">${koMode?`Knockout rounds`:`Fixtures &amp; Results`}</h2><p class="section-note">${koMode?`Straight knockout — win or go home. Each game shows who's backing the teams with their winner pick.`:`All 72 group matches in the order they're played. Tap a match to see everyone's prediction. Results fill in at full time.`}</p>`;
    if(koMode){
      const roundLabel = d=>{
        const fin=C.finalDate||"2026-07-19";
        const days=Math.round((new Date(fin+"T12:00Z")-new Date((d||fin)+"T12:00Z"))/86400000);
        return days<=0?"FINAL":days===1?"3RD PLACE":days<=5?"SEMI-FINAL":days<=9?"QUARTER-FINAL":days<=13?"ROUND OF 16":"ROUND OF 32";
      };
      const kfmt = d=>{ if(!/^\d{4}-\d{2}-\d{2}/.test(d||"")) return d||""; return new Date(d.slice(0,10)+"T12:00:00Z").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"}); };
      const backersOf = team => (D.players||[]).filter(p=>p.winner && teamKey(p.winner)===teamKey(team)).map(p=>p.name);
      html += `<div class="panel">`;
      ko.forEach(k=>{
        const st = k.live?`<div class="st live">Live</div>`:k.finished?`<div class="st ft">FT</div>`:``;
        const score = (k.h!=null&&k.a!=null)?`${k.h} – ${k.a}`:`<span class="v">v</span>`;
        const bh=backersOf(k.home), ba=backersOf(k.away);
        html += `<div class="grp-h">${roundLabel(k.date)} · ${kfmt(k.date)}</div>
        <div class="fxwrap${k.live?' islive':''}">
          <div class="fx">
            <div class="t1">${fteam(k.home,false)}</div>
            <div class="mid"><div class="res">${score}</div>${st}</div>
            <div class="t2">${fteam(k.away,true)}</div>
          </div>
        </div>
        <div class="backers">${bh.length?`<span class="lbl">Backing ${esc(k.home)} (${bh.length}):</span>`+bh.map(n=>`<span class="tagp">${esc(n)}</span>`).join(""):`<span class="tagp none">nobody backed ${esc(k.home)}</span>`}</div>
        <div class="backers">${ba.length?`<span class="lbl">Backing ${esc(k.away)} (${ba.length}):</span>`+ba.map(n=>`<span class="tagp">${esc(n)}</span>`).join(""):`<span class="tagp none">nobody backed ${esc(k.away)}</span>`}</div>`;
      });
      html += `</div>`;
      html += `<details class="arch"><summary>Group stage archive — all 72 matches &amp; predictions</summary>`;
    }
    html += `<div class="panel"><div class="seg">${segs.map(([k,l])=>`<button data-seg="${k}" class="${fixtureFilter===k?'on':''}">${l}</button>`).join("")}</div>`;

    const fxRow = (f,i,r)=>{
      const fin=r&&r.finished, live=r&&r.live;
      const isToday = r && r.date===today && !fin;
      const st = statusLabel(r);
      const score = r ? `${r.h} – ${r.a}` : `<span class="v">v</span>`;
      return `<div class="fxwrap${openFx.has(f.id)?' open':''}${live?' islive':''}${isToday?' istoday':''}" data-fx="${f.id}">
        <div class="fx">
          <div class="t1">${fteam(f.home,false)}</div>
          <div class="mid"><div class="res">${score}</div>${st.txt?`<div class="st ${st.cls}">${st.txt}</div>`:(isToday?`<div class="st live">Today</div>`:``)}</div>
          <div class="t2">${fteam(f.away,true)}</div>
        </div>
        <div class="fxdetail">${fixtureDetail(f,i,r)}</div>
      </div>`;
    };

    // live games pinned to the top (in All / Live views)
    const liveList = D.fixtures.map((f,i)=>({f,i,r:results[f.id]})).filter(x=>x.r&&x.r.live);
    if(liveList.length && (fixtureFilter==="all"||fixtureFilter==="live")){
      html += `<div class="grp-h live-h"><span class="ldot"></span> Live now</div>`;
      liveList.forEach(({f,i,r})=> html += fxRow(f,i,r));
    }

    // order the rest by kickoff date (match-day headers); fall back to group order until the feed loads
    const dateOf = f => {
      const e = api.byPair[teamKey(f.home)+"|"+teamKey(f.away)] || api.byPair[teamKey(f.away)+"|"+teamKey(f.home)];
      return (e && e.date) || "";
    };
    const ordered = D.fixtures.map((f,i)=>({f,i,date:dateOf(f)}));
    const anyDates = ordered.some(o=>o.date);
    if(anyDates){
      ordered.sort((a,b)=> (a.date&&b.date) ? (a.date<b.date?-1:a.date>b.date?1:a.i-b.i)
                         : a.date ? -1 : (b.date ? 1 : a.i-b.i));
    }
    let shown=0, curHead="";
    ordered.forEach(({f,i,date})=>{
      const r=results[f.id]; const fin=r&&r.finished, live=r&&r.live;
      if(fixtureFilter==="live") return;                 // live handled in the top section
      if(fixtureFilter==="ft" && !fin) return;
      if(fixtureFilter==="up" && (fin||live)) return;
      const head = anyDates ? (date?matchDayLabel(date):"Date to be confirmed") : ("Group "+f.group);
      if(head!==curHead){ curHead=head; html+=`<div class="grp-h">${head}</div>`; }
      html += fxRow(f,i,r);
      shown++;
    });
    if(fixtureFilter==="live"){ if(!liveList.length) html+=`<div class="empty">No live matches right now.</div>`; }
    else if(!shown) html+=`<div class="empty">Nothing here yet.</div>`;
    html += `</div>`;
    if(koMode) html += `</details>`;
    view.innerHTML = html;
    view.querySelectorAll("[data-seg]").forEach(btn=>btn.addEventListener("click",()=>{fixtureFilter=btn.getAttribute("data-seg");renderFixtures();}));
    view.querySelectorAll(".fxwrap").forEach(w=>w.addEventListener("click",()=>{
      const id=w.getAttribute("data-fx");
      if(openFx.has(id)) openFx.delete(id); else openFx.add(id);
      w.classList.toggle("open");
    }));
  }

  // Everyone's prediction for one fixture — sorted by points once it's started.
  function fixtureDetail(f,i,r){
    const started = r && (r.finished||r.live);
    let rows = (D.players||[]).map(p=>{
      const g=(p.preds||[])[i]||"—";
      const pt = (started && parseScore(g)) ? matchPoints(g,r) : null;
      return { name:p.name, g, pt };
    });
    if(started) rows.sort((a,b)=>(b.pt||0)-(a.pt||0)||a.name.localeCompare(b.name));
    else rows.sort((a,b)=>a.name.localeCompare(b.name));
    const exactN = rows.filter(x=>x.pt===PTS.exact).length;
    const head = started
      ? `<div class="fxd-h">${r.live?`Live ${r.h}–${r.a}`:`Full time ${r.h}–${r.a}`} · ${exactN} nailed the exact score</div>`
      : `<div class="fxd-h">Everyone's prediction</div>`;
    const list = rows.map(x=>{
      const cls = x.pt===PTS.exact?"g10":x.pt===PTS.resultOne?"g5":x.pt===PTS.resultOnly?"g2":(x.pt===0?"g0":"");
      return `<div class="fxd-row${meName&&x.name===meName?' me':''}">
          <span class="fxd-n">${esc(x.name)}</span>
          <span class="fxd-g">${x.g}</span>
          ${x.pt!=null?`<span class="got ${cls}">+${x.pt}</span>`:`<span class="fxd-soon">—</span>`}
        </div>`;
    }).join("");
    return head + `<div class="fxd-list">${list}</div>`;
  }

  function renderPredictions(){
    const results = buildResults();
    const players = D.players||[];
    if(!players.length){ view.innerHTML=`<h2 class="section">Predictions</h2><div class="panel"><div class="empty">No entrants yet.</div></div>`; return; }
    if(selectedPlayer>=players.length) selectedPlayer=0;
    const p = players[selectedPlayer];
    let html = `<h2 class="section">Predictions</h2><p class="section-note">Every pick in the order the games are played, with points earned so far.</p>
      <div class="panel">
        <div class="selrow"><select id="playerSel">${players.map((pp,i)=>`<option value="${i}"${i===selectedPlayer?' selected':''}>${esc(pp.name)}</option>`).join("")}</select></div>
        <div class="pbonus">
          <div class="b"><div class="k">Top scorer pick</div><div class="vv">${esc(p.topScorer||"—")}</div></div>
          <div class="b"><div class="k">Winner pick</div><div class="vv">${p.winner?fteam(p.winner,true):"—"}</div></div>
        </div>`;
    // order by kickoff (from the live feed); fall back to group order until the feed loads
    const dateOf = f => {
      const e = api.byPair[teamKey(f.home)+"|"+teamKey(f.away)] || api.byPair[teamKey(f.away)+"|"+teamKey(f.home)];
      return (e && e.date) || "";
    };
    const ordered = D.fixtures.map((f,i)=>({f,i,date:dateOf(f)}));
    const anyDates = ordered.some(o=>o.date);
    if(anyDates){
      ordered.sort((a,b)=> (a.date&&b.date) ? (a.date<b.date?-1:a.date>b.date?1:a.i-b.i)
                         : a.date ? -1 : (b.date ? 1 : a.i-b.i));
    }
    let curHead="";
    ordered.forEach(({f,i,date})=>{
      const head = anyDates ? (date?matchDayLabel(date):"Date to be confirmed") : ("Group "+f.group);
      if(head!==curHead){ curHead=head; html+=`<div class="grp-h">${head}</div>`; }
      const guess=(p.preds||[])[i]||"";
      const r=results[f.id];
      let got="";
      if(r&&r.finished&&parseScore(guess)){
        const pt=matchPoints(guess,r);
        const cls= pt===PTS.exact?"g10":pt===PTS.resultOne?"g5":pt===PTS.resultOnly?"g2":"g0";
        got=`<span class="got ${cls}">+${pt}</span>`;
      } else if(r&&r.live&&parseScore(guess)){
        const pt=matchPoints(guess,r);
        got=`<span class="got glive">+${pt} live</span>`;
      }
      html += `
      <div class="pr">
        <div class="p1">${fteam(f.home,false)}</div>
        <div class="pm">
          <div class="guess">${guess||"—"}</div>
          ${r&&r.started?`<div class="actual">${r.live?"Live "+r.h+"-"+r.a:"FT "+r.h+"-"+r.a}</div>`:``}
          ${got}
        </div>
        <div class="p2">${fteam(f.away,true)}</div>
      </div>`;
    });
    html += `</div>`;
    view.innerHTML = html;
    $("#playerSel").addEventListener("change",e=>{selectedPlayer=+e.target.value;renderPredictions();});
  }

  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

  // "2026-06-11" -> "Thursday 11 June" (UTC-safe, no timezone drift)
  function matchDayLabel(ds){
    const [y,m,d] = String(ds||"").split("-").map(Number);
    if(!y||!m||!d) return "Date to be confirmed";
    const dt = new Date(Date.UTC(y, m-1, d));
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const mons = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    return `${days[dt.getUTCDay()]} ${d} ${mons[m-1]}`;
  }

    else if(activeTab==="scorer") renderScorer();

    else if(activeTab==="predictions") renderPredictions();

    t.addEventListener("click",()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      activeTab = t.getAttribute("data-tab");
      renderActive();
    });
  });

  const rb = $("#refreshBtn");
  async function refresh(manual){
    rb.classList.add("spin");
    try{ await fetchAll(); }catch(e){}
    rb.classList.remove("spin");
    fullRender();
  }
  rb.addEventListener("click",()=>refresh(true));

  fullRender();          // instant paint with committed data
  refresh(false);        // then pull live
  setInterval(()=>refresh(false), 60000); // poll each minute
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) refresh(false); });
})();
</script>
</body>
</html>
